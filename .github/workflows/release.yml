name: Build installers

# Genera los 4 instaladores nativos de LyriK:
#   Windows (windows-latest) → .msi + .exe
#   Linux   (ubuntu-latest)  → .deb + .rpm
# jpackage solo puede empaquetar para el SO en el que corre, por eso se usa una matriz.

on:
  push:
    tags:
      - 'v*'            # p. ej. v0.5.0 → crea un Release con los 4 instaladores
  workflow_dispatch: {} # permite lanzarlo manualmente desde la pestaña Actions

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            lfs: true          # libmpv-2.dll (116 MB) está en Git LFS y solo se empaqueta en Windows
          - os: ubuntu-latest
            name: linux
            lfs: false         # Linux usa el mpv del sistema; no necesita descargar el DLL de LFS
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash          # ./gradlew funciona igual en Windows y Linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: ${{ matrix.lfs }}

      # yt-dlp.exe está gitignored (no se versiona); se descarga la última versión para el bundle de Windows.
      - name: Fetch yt-dlp (Windows bundle)
        if: runner.os == 'Windows'
        run: curl -L --fail -o mpv-resources/windows/yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe

      # Falla ruidosamente si el DLL real de libmpv no llegó (p. ej. LFS no se descargó): así no se
      # publica un MSI roto con un puntero LFS de 134 bytes en vez del binario de 116 MB.
      - name: Verify native mpv binary (Windows)
        if: runner.os == 'Windows'
        run: |
          size=$(stat -c%s mpv-resources/windows/libmpv-2.dll)
          echo "libmpv-2.dll = $size bytes"
          if [ "$size" -lt 1000000 ]; then
            echo "::error::libmpv-2.dll parece un puntero LFS ($size bytes), no el DLL real. Falló la descarga de Git LFS."
            exit 1
          fi

      # JBR 21: el proyecto pide toolchain JDK 21 con vendor JetBrains.
      - name: Set up JetBrains Runtime 21
        uses: actions/setup-java@v4
        with:
          distribution: 'jetbrains'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # rpmbuild no viene en ubuntu-latest; se necesita para el .rpm.
      - name: Install rpm tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Package for current OS
        run: bash ./gradlew :composeApp:packageDistributionForCurrentOS --no-daemon --stacktrace

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.name }}
          if-no-files-found: ignore
          path: |
            composeApp/build/compose/binaries/main/msi/*.msi
            composeApp/build/compose/binaries/main/exe/*.exe
            composeApp/build/compose/binaries/main/deb/*.deb
            composeApp/build/compose/binaries/main/rpm/*.rpm

  release:
    # Solo cuando se empuja un tag v*: junta los artefactos de ambos SO en un Release.
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded files
        run: find dist -type f -printf '%p  (%s bytes)\n'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*        # recursivo: los instaladores quedan en dist/<fmt>/archivo
          fail_on_unmatched_files: true
          draft: false
          generate_release_notes: true
